version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dg-postgres
    environment:
      POSTGRES_DB: dreamgadgets
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d dreamgadgets']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dg-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: dg-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:secret@postgres:5432/dreamgadgets
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      REFRESH_TOKEN_SECRET: dev-refresh-secret-change-in-production
    env_file:
      - .env.local
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: dg-web
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: dg-admin
    ports:
      - '3002:3002'
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
